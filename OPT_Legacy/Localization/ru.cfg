		#LOC_OPT_opt_winglet_f_elevon4_title = OPT-W Winglet Type F Elevon 4
		#LOC_OPT_opt_winglet_g_title = OPT-W Winglet Type G
		
		#LOC_OPT_opt_stabilizer_c_desc = Истребительная серия, сильно стреловидная, цельноповоротная поверхность управления. Используется как предкрылок в корне крыла или как переднее горизонтальное оперение.
		#LOC_OPT_opt_stabilizer_d_desc = Истребительная серия, цельноповоротная поверхность управления.
		#LOC_OPT_wing_1a_desc = Крыло космоплана трапециевидной формы. Может содержать топливо и очень хорошо помогает отводить тепло, однако плохо его удерживает.
		#LOC_OPT_winglet_1a_desc = Красивое большое крылышко, которое на самом деле является элевоном. Очень хорошо помогает отводить тепло и лучше всего подходит в качестве вертикального стабилизатора.
		#LOC_OPT_opt_wing_d_desc = Крыло XL серии Questor. Используется как вертикальный стабилизатор для самолётов KH и Humpback.
		#LOC_OPT_opt_wing_e_desc = Крыло XL серии Questor. Используется как основное крыло для самолётов KH и Humpback.
		#LOC_OPT_opt_wing_e_rudder_desc = Вертикальный стабилизатор, который крепится внутрь и сквозь основное крыло. Его стратегическое расположение может быть очень полезным для уменьшения горизонтального сноса.
		#LOC_OPT_opt_winglet_d_desc = Истребительная серия, крыло обратной стреловидности.
		#LOC_OPT_opt_winglet_e_desc = Истребительная серия, стреловидное крыло с приводом. Используется как вертикальный стабилизатор.
		#LOC_OPT_opt_winglet_f_desc = Истребительная серия, крыло обратной стреловидности. Принимает четыре элевона, включая два передних.
		#LOC_OPT_opt_winglet_f_elevon1_desc = Предкрылок и поверхность управления. Нажмите A для ориентации, с отключённой привязкой к углам.
		#LOC_OPT_opt_winglet_f_elevon2_desc = Предкрылок и поверхность управления. Нажмите D для ориентации, с отключённой привязкой к углам. Предел отклонения, возможно, потребуется инвертировать.
		#LOC_OPT_opt_winglet_g_desc = Истребительная серия, стреловидное крыло с приводом. Используется как вертикальный стабилизатор.
	}
