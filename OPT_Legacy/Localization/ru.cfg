		#LOC_OPT_opt_vtol_rudder1_tags = opt реактивный подъёмный вертикальный вертолёт рсб руль тяга поворот рубка
		
		#LOC_OPT_arie73_desc = «ARI» (Air-augmented Rocket Initiated Engine) является — или когда-то был — ярким примером инноваций OPT. Он ушёл в отставку с появлением семейства двигателей OPT-E, включая выпуск ARI-75. Сам этот двигатель был переопределён и занял свою новую нишу. Он во всех отношениях так же способен, как ARI-75, но больше не требует окислителя.
		#LOC_OPT_b_linear_aerospike_desc = Чрезвычайно мощный ракетный двигатель типа аэроспайк для фюзеляжа OPT. Рекламируя его возможности, OPT подчеркнула, что дело не в мелком шрифте, и что мы должны просто сосредоточиться на том, насколько он крут. Мелкий шрифт, кстати, гласит: «ВНИМАНИЕ: склонен к перегреву».
		#LOC_OPT_J61_desc = Этот компактный и винтажный двигатель Mk2 стал широко известен как среди тех, кто любит OPT, так и среди тех, кто его отвергает. Для атмосферного двигателя Starwaster — это сила, с которой нужно считаться, и особенно дорогой билет для тех, кто хочет попасть в космос сегодня. Возможно, к его прозвищу стоит отнестись серьёзно...
		#LOC_OPT_j81turbojet_desc = Кербалов из Научно-двигательного подразделения OPT можно описать только как встретивших сверхъестественную сущность (во благо или во зло), когда они представили эту машину. Характеристики этого устройства заставляют его выглядеть на 100 или 1000 лет опередившим своё время. Чрезвычайная осторожность должна соблюдаться ...и по отношению... к любому пилоту, который неоднократно просит разрешения управлять кораблём, оснащённым этим двигателем.
		#LOC_OPT_opt_vtol_bubble1_desc = Bubble — это уникально продвинутый гибридный двигатель и белая ворона среди достижений. В его компактной рамке заключены возможности турбовентиляторного, прямоточного и разогнанного ракетного ARI SCOOP с производительностью как у J81. О, и он может наклоняться как управляемая поверхность.
		#LOC_OPT_opt_vtol_egg_desc = Специальный запрос был сделан корпорацией по переработке в космосе, которая хотела перевозить тяжёлые грузы в горизонтальных посадочных модулях. В процессе проектирования для них этого двигателя один умник придумал это имя, и оно мгновенно прижилось. К сожалению, несколько настоящих яиц было разбито, пока половина инженерного отдела смеялась несколько минут подряд, закрепляя название.
		#LOC_OPT_opt_egg_desc = Специальный запрос был сделан корпорацией по переработке в космосе, которая хотела перевозить тяжёлые грузы в горизонтальных посадочных модулях. В процессе проектирования для них этого двигателя один умник придумал это имя, и оно мгновенно прижилось. К сожалению, несколько настоящих яиц было разбито, пока половина инженерного отдела смеялась несколько минут подряд, закрепляя название.
		#LOC_OPT_opt_sage_desc = Благодаря положительному приёму создания S.U.R.G.E., быстро возрос спрос на компактную и экономичную версию для небольших космопланов. Был выбран чрезвычайно популярный каркас двигателя J-61, но некоторые конструктивные особенности сделали его непригодным в плотной атмосфере. В результате он был назван S.A.G.E. (Стратосферный Усиленный (Волнистый) Гаусс-двигатель).
		#LOC_OPT_opt_surge_desc = Неуклюжий дизайн этого двигателя при первом выпуске стал фактором, который привёл OPT к банкротству. Помощь пришла от таинственного агентства под названием «Deep Sky», которое представило прототип двигателя, переоборудованный с тем, что назвали WarpJet — технологией для сжатия и сжигания любого воздуха через сверхмощную магнитную катушечную сборку. Подвергнув тщательной проверке, OPT принял и объединил WarpJet с S.C.O.O.P., создав S.U.R.G.E. (Боковой Дышащий Гаусс-двигатель).
		#LOC_OPT_opt_vtol_heli1_desc = Не каждый космоплан OPT дышит гиперзвуковым воздухом. Те, которые не дышат, могут оказаться в поиске высокоэффективного решения при работе на низких скоростях. Имеет узлы для 1,25 м и 3,75 м. Использование верхнего узла 3,75 м отключает его воздухозаборник. Его выхлоп не повреждает другие детали, поэтому его можно безопасно соединять в стопки.
		#LOC_OPT_opt_vtol_hc1_desc = Недостаточно иметь подъёмный двигатель, который работает только в атмосфере, поэтому этот обтекаемый аэродинамический бегемот — одновременно и вентилятор, и шип. Он может закрывать дно стека диаметром 3,75 м и даже может опускать свою двигательную часть вниз, чтобы вместить очень большие крылья (толщиной до 0,5 м).
		#LOC_OPT_opt_vtol_lpj1_desc = Поддержание малого занимаемого объёма критически важно для многих инженерных задач. Для этого конкретного двигателя мы полностью достигли цели. Будучи скорее байпасным маршрутизатором, чем настоящим двигателем, он набирает мощность с ростом скорости и очень экономичен, но очень требователен к воздухозаборнику.
		#LOC_OPT_opt_vtol_lpr1_desc = Поддержание малого занимаемого объёма критически важно для многих инженерных задач. Для этого конкретного двигателя мы полностью достигли цели. Низкопрофильный двигатель Prominence силён и продвинут для своего размера и веса, однако он не использует поток воздуха, как двигатели серии ARI.
		#LOC_OPT_opt_vtol_lpr2_desc = Поддержание малого занимаемого объёма критически важно для многих инженерных задач. Для этого конкретного двигателя мы полностью достигли цели. Низкопрофильный двигатель Irradiance силён и продвинут для своего размера и веса, однако он не использует поток воздуха, как двигатели серии ARI.
		#LOC_OPT_opt_vtol_rudder1_desc = Руководители OPT уже давно осведомлены о странном явлении, возникающем во время фазы подъёма, которое они внутренне назвали «фантомное рыскание». Некоторое время основными ответами на это явление были «больше ускорителей (с поворотом сопла по рысканью)» или «просто смирись». Однако спустя довольно много времени пришла блестящая идея создать устройство РСБ, которое было бы одновременно аэродинамичным и работающим на воздушном дыхании.
		#LOC_OPT_opt_vtol_wrapl1_desc = Это мощное приспособление — Фюзеляжный вертикальный двигатель — крепится по бокам фюзеляжа и включает в себя работающие створки воздухозаборника и выхлопа для защиты его внутренностей от огня входа в атмосферу. Будьте осторожны и не включайте этот двигатель, пока выхлопная створка закрыта!
		#LOC_OPT_opt_vtol_wrapl2_desc = Это мощное приспособление — Фюзеляжный вертикальный двигатель — крепится по бокам фюзеляжа и включает в себя работающие створки воздухозаборника и выхлопа для защиты его внутренностей от огня входа в атмосферу. Будьте осторожны и не включайте этот двигатель, пока выхлопная створка закрыта!
		#LOC_OPT_turboRamJetj_60_desc = Кербальские учёные раньше думали, что Боб Керман кричит на заднем сиденье, когда его корабль пролетает на скорости Мах 3. Но Вернер верил, что Боб — храбрый кербал и никогда не кричит во время полётов. Он считает, что звук вызван взаимодействием особой формы планера со сверхвысокоскоростным воздухом. В ходе дальнейших исследований Вернер опубликовал свою теорию об эффекте «Крика». Учёные OPT применили эту теорию к своему последнему проекту атмосферного двигателя — хотя это и привело OPT к банкротству, зато теперь у них есть первый в истории Кричащий реактивный двигатель! На низких скоростях двигатель работает как обычный турбореактивный. Однако на более высоких скоростях он кричит! На короткий период вступает в действие эффект «Крика», который даёт мощный толчок. На ещё более высоких скоростях он взрывается.
		#LOC_OPT_turboRamJetj_60d_desc = Потребовалось немало уговоров руководителей OPT, прежде чем они смогли решиться — несмотря на свою репутацию производителей отличных атмосферных двигателей — выпустить ещё один двухрежимный двигатель, а именно устанавливаемый в стек. Эта J-60D унаследовала потенциал высокой тяги на большой высоте, которым славится J-61, и суперспособность LFO, близкую к гондоле J-81. Что лучше всего, это всё ещё Кричащий реактивный двигатель... так что убедитесь, что у всех есть защитные наушники.
			
		// Drop Tanks
		#LOC_OPTdropTank_title = OPT Сбрасываемый бак Mk I
		#LOC_OPTdropTank2_title = OPT Сбрасываемый бак Mk II
		
		#LOC_OPTdropTank_desc = Этот стандартизированный аэродинамический сбрасываемый бак не только способен вместить приличное количество жидкого топлива или окислителя, но и не самовоспламеняется! По крайней мере, мы на это надеемся.
		#LOC_OPTdropTank2_desc = Более крупный, более укреплённый сбрасываемый бак, в 1,5 раза больше.
		
		// Humpback
