		#LOC_OPT_b_2m_bicoupler_desc = Хорошо выглядящий переходник от фюзеляжа Stail к двум конструкциям диаметром 2,5 м.
		#LOC_OPT_b_2m_tanks_desc = Деталь фюзеляжа для системы Stail от OPT, доступна в нескольких вариантах для разных типов топлива.
		#LOC_OPT_b_4m_drone_desc = Никогда не знаешь, кто бы тратил больше денег на беспилотник, когда можно использовать кербалов.
		#LOC_OPT_b_engineMount_4_desc = Это хвостовая часть крепления двигателя, которая дополняет любые модули J. Также интегрированная система охлаждения обеспечивает отличную термостойкость.
		#LOC_OPT_b_4m_tanks_desc = Деталь фюзеляжа для системы Stail от OPT, доступна в нескольких вариантах для разных типов топлива.
		#LOC_OPT_b_4m_lab_desc = Научный модуль для деталей космоплана системы Stail. Несмотря на подозрительный запах ракетного топлива, представители OPT быстро заверили, что это, по сути, не переделанный топливный бак и что беспокоиться об искрах не нужно. Однако они предостерегли от курения в научной лаборатории.
		#LOC_OPT_b_4m_tail_desc = Для аэродинамики.
		#LOC_OPT_b_cockpit_desc = Больше, крупнее и площе, чем любая предыдущая кабина J-серии. Хотя среди инженеров она получила прозвище «лопатонос», OPT уверяет нас, что это связано лишь с проходящим внешним сходством, а не с её аэродинамическими свойствами или какой-либо склонностью закапываться в землю.
		#LOC_OPT_b_cockpit_qs_desc = Кабина Stail-QS изначально разрабатывалась для сверхсекретного, очень высотного суборбитального разведывательного космоплана. Но после того, как они поняли, что шпионить не за кем, проект был закрыт, и кабина стала доступна для продажи. Этот вариант оснащён двумя ударными воздухозаборниками!
		#LOC_OPT_b_dropBay_mk2_desc = После того, как несколько человек пожаловались на необходимость использовать ускорители для удаления роверов, инженеры OPT разработали этот сбрасываемый отсек, позволяющий сбрасывать транспортные средства прямо вниз. Вариант Mk2 не имеет переборок.
		#LOC_OPT_b_oms_desc = Долгожданный и часто требуемый клиентурой с классическими наклонностями, встроенный САС и РСБ для фюзеляжа Stail наконец появился на свет.
		#LOC_OPT_b2_4m_adaptor_variant_desc = Аэродинамический переходник с 2,5 м на систему Stail, который можно настроить для различных конфигураций баков. Инженеры согласны, что это шаг вперёд по сравнению с предыдущим решением изолентой.
		#LOC_OPT_b2_adaptor_desc = Новый и улучшенный переходник фюзеляжа с 2,5 м на систему Stail, предлагающий два узла крепления 1,5 м параллельно настраиваемому фюзеляжу 2,5 м.
		#LOC_OPT_bf_adaptor_desc = Сохраняя аэродинамику деталей Stail, грузовые модули Stail позволяют загружать крупногабаритные грузы за счёт вместимости топлива.
		#LOC_OPT_bf_cargo_desc = Сохраняя аэродинамику деталей Stail, грузовые модули Stail позволяют загружать крупногабаритные грузы за счёт вместимости топлива.
		#LOC_OPT_bf_cargo_tail_desc = Сохраняя аэродинамику деталей Stail, грузовые модули Stail позволяют загружать крупногабаритные грузы за счёт вместимости топлива.
		#LOC_OPT_bs_adaptor_desc = Этот обтекаемый переходник предназначен для плотного прилегания к стеку 2,5 м, открывая безграничные возможности для установки любых чудесных вещей... при условии, что их диаметр составляет 1,25 м. Его также можно использовать как небольшой бак монопропеллента.
		#LOC_OPT_mk2b_adaptor_desc = Поспешное сотрудничество между OPT и C7 Aerospace привело к созданию этого. Мы не совсем уверены, почему они посчитали это хорошей идеей, но мы предполагаем, что когда-нибудь кто-нибудь найдёт ему применение.
		
		#LOC_OPT_b_docking_port_desc = Стыковочный узел спроектирован так, чтобы подходить как для малых стыковочных узлов 1,25 м, так и для стыковочных узлов 2,5 м. Гениально!
		#LOC_OPT_b_docking_port1_desc = Это небольшой грузовой отсек, объединённый с малым стыковочным узлом.
		#LOC_OPT_B_Drop_Bay_mk1_desc = После того, как несколько кербалов пожаловались на то, что им приходится использовать ускорители для удаления роверов, инженеры OPT разработали этот сбрасываемый отсек, позволяющий сбрасывать транспортные средства прямо вниз. Вариант Mk1 имеет переборки на каждом конце.
		
