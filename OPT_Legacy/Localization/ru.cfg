		#LOC_OPT_mk3_shuttle_noseCone_title = OPT Mk3 Носовой обтекатель космического шаттла
		
		#LOC_OPT_mk3Cockpit_Airliner_desc = Кабина для тех, кто предпочитает оставаться в облаках. Но не стесняйтесь брать её в дальний космос! Примечание: внутренняя кабина (IVA) всё ещё находится в доставке и на таможне.
		#LOC_OPT_mk3_shuttle_noseCone_desc = Носовой обтекатель с РСБ. Он предназначен для установки на популярную кабину C7 Aerospace Mk3.
		
