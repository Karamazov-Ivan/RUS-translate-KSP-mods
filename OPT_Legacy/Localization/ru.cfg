		#LOC_OPT_jl_3m_adaptor_desc = Переходник для фюзеляжей J и Горбач. Включает точки крепления для деталей Mk2.
		#LOC_OPT_jl_7m_adaptor_desc = Переходник для фюзеляжей J и Горбач. Включает точки крепления для деталей Mk2.
		#LOC_OPT_l_3m_bicoupler_desc = Самый большой бикулер из когда-либо виденных. Позволяет крепить детали диаметром 3,75 м, такие как «Тёмный двигатель».
		#LOC_OPT_l_6m_cargo_desc = Стандартный грузовой отсек OPT, почти способный вместить груз 3,75 м и почти столько же топлива, сколько оранжевый бак-гигант.
		#LOC_OPT_l_6m_crew_desc = Эта каюта OPT — самая большая и просторная из когда-либо созданных. Несмотря на то, что корпус Горбач устарел, пассажиры и экипаж всё равно с нетерпением просятся поехать здесь и работать в его кабине.
		#LOC_OPT_l_6m_fuselage_desc = Полый фюзеляж Горбач. Он идеально подходит для размещения баков с ещё большим количеством топлива или широких посадочных модулей.
		#LOC_OPT_l_7m_cargoTail_desc = Рампа для корпуса Горбач. К сожалению, она глючная.
		#LOC_OPT_l_8m_cockpit_desc = Огромная и несколько чудовищная кабина. Это одна из двух кабин OPT с наибольшим количеством посадочных мест.
		#LOC_OPT_l_oms_hollow_desc = Некоторые инженеры (даже в OPT) долгое время хотели, чтобы эта самая деталь появилась на рынке. К сожалению, сразу после того, как они решили начать собирать концепт-деталь для себя, аэродинамические блоки двигателей начали сходить с конвейера. Эти инженеры решили пойти на компромисс и представили свой проект как, по сути, служебную деталь, несущую только бак и моментные колёса. К счастью, их бунт не стоил им увольнения или чего-то похуже.
		
