		#LOC_OPT_a_2m_bicoupler_desc = Способный обеспечить не одно, а два крепления диаметром 3,75 м, K-бикулер был провозглашён революцией в авиакосмической промышленности. Хотя в целом он не оправдал этих ожиданий, ему удалось произвести революцию в новой области — разделении одной большой вещи на две большие, в чём он преуспел.
		#LOC_OPT_a_3m_tanks_desc = Это просто топливный бак, но очень большой ёмкости. И он имеет форму коробки.
		#LOC_OPT_a_3m_fuselage_desc = Это половина того, чем был полый отсек раньше. Вот так.
		#LOC_OPT_a_6m_cargo_desc = Большой грузовой отсек, предположительно предназначенный для перевозки соответствующих крупногабаритных грузов — но с инженерами OPT никогда не знаешь наверняка.
		#LOC_OPT_a_6m_cargoTail_desc = Ни один грузовой шаттл не обходится без рампы, по которой груз может заехать или закатиться самостоятельно. Верно?
		#LOC_OPT_a_6m_tanks_desc = Это просто топливный бак, но очень большой ёмкости. И он имеет форму коробки.
		#LOC_OPT_a_6m_fuselage_desc = Иногда необходимо иметь пространство без необходимости открывать дверь для прямого доступа, а иногда наличие двери раздражает, так как она может заклинить и привести к серьёзным травмам. Полый фюзеляж — это, по сути, увеличенный служебный отсек. Если что-то слишком длинное, чтобы пройти через грузовую дверь, здесь есть дополнительное пространство.
		#LOC_OPT_a_cockpit_desc = Кабина Chimera жертвует значительной долей обычных удобств (зоны сидений, ароматизированной сосны и покачивающейся хула-девушки на приборной панели) ради повышения выживаемости при входе в атмосферу и облегчения способности рассекать атмосферу... что, как скажут некоторые, не очень хорошо при спуске. Но эй, действует правило крутизны.
		#LOC_OPT_a_cockpit_adaptor_desc = Модифицированный переходник, созданный для уникальной шаттловой кабины Avatar. Также дополнен сдвоенным ударным воздухозаборником!
		#LOC_OPT_a_oms_hollow_desc = Долгожданный и часто требуемый клиентурой с классическими наклонностями, встроенный САС и РСБ для фюзеляжа Avatar наконец появился на свет.
		#LOC_OPT_ab_3m_adaptor_desc = Приспосабливаться к изменениям может быть трудно. Этот удобный отсек фюзеляжа не поможет, если только вам не нужно перейти от детали системы Stail к её более крупному аналогу типа K — в этом случае он то, что нужно.
		#LOC_OPT_ab_7m_adaptor_desc = Приспосабливаться к изменениям может быть трудно. Этот удобный отсек фюзеляжа не поможет, если только вам не нужно перейти от детали системы Stail к её более крупному аналогу типа K — в этом случае он то, что нужно.
		#LOC_OPT_a_8m_cockpit_desc = Эта большая кабина пользовалась большим спросом и была специально построена для удовлетворения потребностей поклонников STS в преддверии прогресса выше и дальше популярной рамки шаттла Mk3. Делая ставку на высокий потенциал широкофюзеляжных грузовых самолётов, инженеры OPT даже добавили полое пространство внутри кабины для хранения важного оборудования и ресурсов поддержки экипажа, к которым никогда не нужно получать доступ в грузовом отсеке.
		
		// Communication
		#LOC_OPT_OPTantenna_title = OPT Сверхвысокочастотная лезвийная антенна
		#LOC_OPT_OPTantenna_desc = Изначально задуманная как устройство для разрезания облаков на более мелкие кусочки, лезвийная антенна обеспечивает связь в атмосфере без ущерба для аэродинамики! Первоначально принадлежала и разрабатывалась Kerbal Space Industries, но недавно была получена в результате промышленного саботажа и получила новую окраску.
		
		// Electric
		#LOC_OPT_opt_powersphere1a_title = OPT-E VS01-125 Силовая ячейка «Приливная сила»
		#LOC_OPT_opt_powersphere1a2_title = OPT-E VS01-250 Силовая ячейка «Приливная сила»
		#LOC_OPT_opt_powersphere1b_title = OPT-E VS02-125 Силовая ячейка «Тёмная энергия»
		#LOC_OPT_opt_powersphere2_title = OPT-E VS02-250 Силовая ячейка «Тёмная энергия»
		
		#LOC_OPT_opt_powersphere1a_desc = Серия VS00 — это двигатель во всех смыслах, только не предназначенный для движения. Торговые секреты глубоко скрыты за тем, как работает этот величественный топливный элемент, но если его кодовое имя является каким-либо намёком, его работа может напоминать внутренности небесного тела.
		#LOC_OPT_opt_powersphere1a2_desc = Серия VS00 — это двигатель во всех смыслах, только не предназначенный для движения. Торговые секреты глубоко скрыты за тем, как работает этот величественный топливный элемент, но если его кодовое имя является каким-либо намёком, его работа может напоминать внутренности небесного тела.
		#LOC_OPT_opt_powersphere1b_desc = После открытия и углублённых исследований «Тёмной массы» инженерное подразделение OPT в конечном итоге надёжно подтвердило ещё большее применение Тёмной массе. Используя невероятно плотные внутренние и электромагнитные конструкционные материалы, мы позволили Тёмной массе перерабатывать более мощные вещества, чем жидкое топливо и окислитель, и производить любопытные и экзотические вещи!
		#LOC_OPT_opt_powersphere2_desc = Никто не знал, что увеличение такого типа реактора приведёт к росту его пропускной способности намного выше линейного. Выгода и количество хранящейся внутри Тёмной массы настолько велики, что это пугает! А что, если Тёмная масса каким-то образом вырвется из этого устройства?!
		
