		#LOC_OPT_a_6m_tanks_title = OPT Avatar Fuel Tank 6m
		#LOC_OPT_a_6m_fuselage_title = OPT Avatar Hollow Fuselage 6m
		#LOC_OPT_a_cockpit_title = OPT Avatar Chimera Cockpit
