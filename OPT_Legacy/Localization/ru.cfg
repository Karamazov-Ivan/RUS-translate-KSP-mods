		#LOC_OPT_arie73_desc = «ARI» (Air-augmented Rocket Initiated Engine — двигатель с воздушной форсажной камерой) был или когда-то был ярким примером инноваций OPT. Он ушёл на пенсию с появлением семейства двигателей OPT-E, включая выпуск ARI-75. Сам этот двигатель был переопределён и занял свою новую нишу. Он во всех отношениях так же способен, как и ARI-75, но больше не требует окислителя.
		#LOC_OPT_b_linear_aerospike_desc = Чрезвычайно мощная ракета с аэрошипным соплом для фюзеляжа OPT. Рекламируя его возможности, OPT подчёркивала, что дело не только в мелком шрифте, и что мы должны просто сосредоточиться на том, насколько он крут. В мелком шрифте, как ни странно, значится: «ВНИМАНИЕ: возможно перегревание».
		#LOC_OPT_J61_desc = Этот компактный и винтажный двигатель Mk2 стал широко известен как среди тех, кто любит OPT, так и среди тех, кто её отвергает. Для атмосферного двигателя Starwaster — это сила, с которой нужно считаться, и особенно дорогой билет для тех, кто хочет отправиться в космос сегодня. Возможно, к его прозвищу стоит отнестись серьёзно…
		#LOC_OPT_j81turbojet_desc = Кербанов из отдела науки о движении OPT можно описать только так: они, должно быть, встретили сверхъестественное существо, к лучшему или к худшему, когда представили эту машину. Характеристики этого устройства заставляют его казаться на 100 или 1000 лет опередившим своё время. Крайняя осторожность и пристальное внимание должны проявляться …и по отношению… к любому пилоту, который неоднократно просит летать на корабле, оснащённом этим двигателем.
		#LOC_OPT_opt_vtol_bubble1_desc = «Пузырь» — это уникально продвинутый гибридный двигатель и белая ворона среди достижений. В его компактной конструкции объединены возможности турбовентиляторного двигателя, прямоточного воздушно-реактивного двигателя и разогнанной ракеты ARI SCOOP с производительностью, как у J81. Ах да, и он может наклоняться, как поверхность управления.
		#LOC_OPT_opt_vtol_egg_desc = Специальный запрос поступил от космической нефтеперерабатывающей корпорации, которая хотела перевозить тяжелые грузы в горизонтальных посадочных модулях. В процессе проектирования для них этого двигателя какой-то умник придумал это название, и оно мгновенно прижилось. К сожалению, несколько настоящих яиц были разбиты, пока половина инженерного отдела смеялась несколько минут подряд, закрепляя название.
		#LOC_OPT_opt_egg_desc = Специальный запрос поступил от космической нефтеперерабатывающей корпорации, которая хотела перевозить тяжелые грузы в горизонтальных посадочных модулях. В процессе проектирования для них этого двигателя какой-то умник придумал это название, и оно мгновенно прижилось. К сожалению, несколько настоящих яиц были разбиты, пока половина инженерного отдела смеялась несколько минут подряд, закрепляя название.
		#LOC_OPT_opt_sage_desc = Благодаря положительному приёму создания S.U.R.G.E., быстро вырос спрос на компактную и экономичную версию для небольших космопланов. Был выбран чрезвычайно популярный каркас двигателя J-61, но некоторые конструктивные особенности сделали его непригодным в плотной атмосфере. В результате он был назван S.A.G.E. (Stratosphere Accentuated (Undulating) Gauss Engine — стратосферный усиленный (пульсирующий) двигатель Гаусса).
		#LOC_OPT_opt_surge_desc = Неуклюжий дизайн этого двигателя при его первом выпуске стал одним из факторов, приведших к банкротству OPT. Помощь пришла от таинственного агентства под названием «Deep Sky», которое представило прототип двигателя, переоборудованный с использованием так называемого WarpJet — технологии сжатия и сжигания любого воздуха с помощью сверхмощной магнитной катушечной сборки. Внимательно изучив, OPT согласилась и соединила WarpJet с S.C.O.O.P., создав S.U.R.G.E. (Sidelong Undulating Respirating Gauss Engine — боковой пульсирующий дышащий двигатель Гаусса).
		#LOC_OPT_opt_vtol_heli1_desc = Не каждый космоплан OPT дышит гиперзвуковым воздухом. Тем, которые нет, может потребоваться высокоэффективное решение при работе на низких скоростях. Имеет узлы для 1.25 м и 3.75 м. Использование верхнего узла 3.75 м отключает его воздухозаборник. Его выхлоп не повреждает другие детали, поэтому его можно безопасно соединять в стопки.
		#LOC_OPT_opt_vtol_hc1_desc = Недостаточно иметь подъёмный двигатель, который работает только в атмосфере, поэтому этот обтекаемый аэродинамический бегемот одновременно является и вентилятором, и конусом. Он может закрывать дно стека 3.75 м и даже может опускать свою двигательную часть вниз, чтобы подходить для очень больших крыльев (толщиной до 0.5 м).
		#LOC_OPT_opt_vtol_lpj1_desc = Сохранение малого размера имеет решающее значение для многих инженерных задач. Для этого конкретного двигателя мы полностью достигли этой цели. Будучи скорее байпасным маршрутизатором, чем настоящим двигателем, он набирает мощность с ростом скорости и очень экономичен, но очень требователен к воздухозаборнику.
		#LOC_OPT_opt_vtol_lpr1_desc = Сохранение малого размера имеет решающее значение для многих инженерных задач. Для этого конкретного двигателя мы полностью достигли этой цели. Маленький двигатель «Протуберанец» силён и продвинут для своих размеров и веса, однако он не использует воздушный поток, как двигатели серии ARI.
		#LOC_OPT_opt_vtol_lpr2_desc = Сохранение малого размера имеет решающее значение для многих инженерных задач. Для этого конкретного двигателя мы полностью достигли этой цели. Маленький двигатель «Излучение» силён и продвинут для своих размеров и веса, однако он не использует воздушный поток, как двигатели серии ARI.
		#LOC_OPT_opt_vtol_rudder1_desc = Руководители OPT уже давно знают о странном явлении, возникающем во время фазы подъёма, которое они внутренне называют «фантомное рыскание». Некоторое время большинство ответов на это явление были такими: «больше ускорителей (с поворотом сопла по рысканию)» или «просто смирись», однако спустя довольно много времени пришла блестящая идея создать устройство RCS, которое было бы одновременно аэродинамичным и воздушно-реактивным.
		#LOC_OPT_opt_vtol_wrapl1_desc = Этот мощный аксессуар, вертикальный фюзеляжный двигатель, крепится по бокам фюзеляжа и включает работающие створки воздухозаборника и выхлопа, чтобы защитить его внутренности от огня при входе в атмосферу. Будьте осторожны, не включайте этот двигатель, пока выхлопная створка закрыта!
		#LOC_OPT_opt_vtol_wrapl2_desc = Этот мощный аксессуар, вертикальный фюзеляжный двигатель, крепится по бокам фюзеляжа и включает работающие створки воздухозаборника и выхлопа, чтобы защитить его внутренности от огня при входе в атмосферу. Будьте осторожны, не включайте этот двигатель, пока выхлопная створка закрыта!
		#LOC_OPT_turboRamJetj_60_desc = Кербанские учёные раньше думали, что Боб Керман кричит на заднем сиденье, когда его корабль превышает скорость 3 Маха. Но Вернер верил, что Боб — храбрый кербан и никогда не кричит во время полётов. Он считает, что звук вызван особой формой фюзеляжа, взаимодействующей со сверхскоростным воздухом. В ходе дальнейшего расследования Вернер опубликовал свою теорию об эффекте «Крика». Учёные OPT применили эту теорию к своему последнему проекту атмосферного двигателя, хотя это и привело OPT к банкротству, но теперь у них есть первый в истории «Кричащий двигатель»! На низких скоростях двигатель работает как обычный турбореактивный. Однако на более высоких скоростях он кричит! На короткое время эффект «крика» вступает в силу и даёт мощный импульс. На ещё более высоких скоростях он взрывается.
		#LOC_OPT_turboRamJetj_60d_desc = Потребовалось немало уговоров руководителей OPT, прежде чем они смогли решиться, несмотря на их репутацию производителей отличных воздушно-реактивных двигателей, выпустить ещё один двухрежимный двигатель, а именно компонуемый в стек. Этот J-60D унаследовал высокую тягу на большой высоте, которой славится J-61, и сверхмощность LFO, близкую к гондоле J-81. И что лучше всего, это всё ещё «Кричащий двигатель»… так что убедитесь, что у всех есть защитные наушники.
		
		// Drop Tanks
		#LOC_OPTdropTank_title = OPT DropTank Mk I
		#LOC_OPTdropTank2_title = OPT DropTank Mk II
		
		#LOC_OPTdropTank_desc = Этот стандартизированный аэродинамический сбрасываемый топливный бак не только вмещает приличное количество жидкого топлива или окислителя, но и не самовоспламеняется! По крайней мере, мы на это надеемся.
		#LOC_OPTdropTank2_desc = Более крупный и прочный сбрасываемый топливный бак, в 1.5 раза больше.
		
		// Humpback
		#LOC_OPT_jl_3m_adaptor_title = OPT Humpback to J Short Adapter
		#LOC_OPT_jl_7m_adaptor_title = OPT Humpback to J Long Adapter
		#LOC_OPT_l_3m_bicoupler_title = OPT Humpback Bicoupler
		#LOC_OPT_l_6m_cargo_title = OPT Humpback Cargo Bay
		#LOC_OPT_l_6m_crew_title = OPT Humpback Crew Compartment
		#LOC_OPT_l_6m_fuselage_title = OPT Humpback Hollow Fuselage
		#LOC_OPT_l_7m_cargoTail_title = OPT Humpback Tail Cargo Ramp
		#LOC_OPT_l_8m_cockpit_title = OPT Humpback Cockpit
		#LOC_OPT_l_oms_hollow_title = OPT Humpback Inline SAS Unit Hollow
		
		#LOC_OPT_jl_3m_adaptor_desc = Переходник для фюзеляжей J и Humpback. Включает точки крепления для деталей Mk2.
		#LOC_OPT_jl_7m_adaptor_desc = Переходник для фюзеляжей J и Humpback. Включает точки крепления для деталей Mk2.
		#LOC_OPT_l_3m_bicoupler_desc = Самый большой бикулер из когда-либо виденных. Позволяет крепить детали 3.75 м, такие как Тёмный привод.
		#LOC_OPT_l_6m_cargo_desc = Стандартный грузовой отсек OPT, он почти способен вместить груз 3.75 м и почти столько же топлива, как гигантский оранжевый бак.
		#LOC_OPT_l_6m_crew_desc = Эта кабина OPT самая большая и просторная из всех когда-либо разработанных. Несмотря на то, что корпус Humpback устарел, пассажиры и экипаж всё равно с нетерпением просятся летать здесь и работать в его кабине.
		#LOC_OPT_l_6m_fuselage_desc = Полый фюзеляж Humpback. Он идеально подходит для установки баков с ещё большим количеством топлива или широких посадочных модулей.
		#LOC_OPT_l_7m_cargoTail_desc = Трап для корпуса Humpback. К сожалению, он глючный.
		#LOC_OPT_l_8m_cockpit_desc = Огромная и несколько чудовищная кабина. Это одна из двух кабин OPT с наибольшим количеством мест.
		#LOC_OPT_l_oms_hollow_desc = Некоторые инженеры, даже из OPT, давно хотели, чтобы эта деталь появилась на рынке. К сожалению, как только они решили начать сборку концептуальной детали для себя, с конвейеров начали сходить блоки аэродинамических маневровых двигателей. Эти инженеры решили пойти на компромисс и представили свой проект как, по сути, вспомогательную деталь, несущую только топливные баки и гиродины. Их бунт, к счастью, не привёл к увольнению или чему-то похуже.
		
		// Mk2
		#LOC_OPT_mk2_cockpit_title = OPT Mk2 Cockpit Legacy
		#LOC_OPT_mk2_cockpit_desc = Хорошо выглядящая кабина для фюзеляжа Mk2.
		
		// Mk3
		#LOC_OPT_mk3Cockpit_Airliner_title = OPT Mk3 Airline Cockpit
		#LOC_OPT_mk3_shuttle_noseCone_title = OPT Mk3 Space Shuttle Nose Cone
		
		#LOC_OPT_mk3Cockpit_Airliner_desc = Кабина для тех, кто любит оставаться в облаках. Но не стесняйтесь брать её в дальний космос! Примечание: внутренняя кабина всё ещё на стадии доставки и растаможивания.
		#LOC_OPT_mk3_shuttle_noseCone_desc = Обтекатель с системой RCS. Разработан для установки на популярную кабину C7 Aerospace Mk3.
		
		// Stail
		#LOC_OPT_b_2m_bicoupler_title = OPT Stail Bicoupler
		#LOC_OPT_b_2m_tanks_title = OPT Stail Fuel Tank 2m
		#LOC_OPT_b_4m_drone_title = OPT Stail Drone Core
		#LOC_OPT_b_engineMount_4_title = OPT Stail Engine Mount
		#LOC_OPT_b_4m_tanks_title = OPT Stail Fuel Tank 4m
		#LOC_OPT_b_4m_lab_title = OPT Stail Mobile Processing Lab LP3
		#LOC_OPT_b_4m_tail_title = OPT Stail Aerodynamic Tail
		#LOC_OPT_b_cockpit_title = OPT Stail Spaceplane Cockpit
		#LOC_OPT_b_cockpit_qs_title = OPT Stail QS01 Cockpit
		#LOC_OPT_b_dropBay_mk2_title = OPT Stail Cargo Bay Mk II
		#LOC_OPT_b_oms_title = OPT Stail Inline SAS Unit
		#LOC_OPT_b2_4m_adaptor_variant_title = OPT Stail to 2.5m Adapter
		#LOC_OPT_b2_adaptor_title = OPT Stail to 2.5m Adapter Variant
		#LOC_OPT_bf_adaptor_title = OPT Stail Freight Cargo Bay Adapter
		#LOC_OPT_bf_cargo_title = OPT Stail Freight Cargo Bay
		#LOC_OPT_bf_cargo_tail_title = OPT Stail Freight Tail Cargo Ramp
		#LOC_OPT_bs_adaptor_title = OPT Stail Fairing MonoPropellant Tank
		#LOC_OPT_mk2b_adaptor_title = OPT Stail to Mk2 Adapter
		
		#LOC_OPT_b_docking_port_title = OPT Stail Inline Docking Port
		#LOC_OPT_b_docking_port1_title = OPT Stail Inline Docking & Utility Bay
		#LOC_OPT_B_Drop_Bay_mk1_title = OPT Stail Cargo Bay Mk I
		
		#LOC_OPT_b_2m_bicoupler_desc = Хорошо выглядящий переходник с фюзеляжа Stail на две конструкции диаметром 2.5 м.
		#LOC_OPT_b_2m_tanks_desc = Деталь фюзеляжа для системы Stail от OPT, доступная в нескольких вариантах для разных типов топлива.
		#LOC_OPT_b_4m_drone_desc = Никогда не знаешь, кто потратит больше денег на беспилотник, когда можно использовать кербанов.
		#LOC_OPT_b_engineMount_4_desc = Это хвостовая часть крепления двигателя, которая дополняет любые модули J. Также интегрированная система охлаждения обеспечивает превосходную термостойкость.
		#LOC_OPT_b_4m_tanks_desc = Деталь фюзеляжа для системы Stail от OPT, доступная в нескольких вариантах для разных типов топлива.
		#LOC_OPT_b_4m_lab_desc = Научный модуль для деталей космоплана системы Stail. Несмотря на подозрительный запах ракетного топлива, представители OPT быстро заявили, что это, по сути, не просто переделанный топливный бак, и беспокоиться об искрах не нужно. Однако они предостерегли от курения в научной лаборатории.
		#LOC_OPT_b_4m_tail_desc = А для аэродинамики.
		#LOC_OPT_b_cockpit_desc = Больше, крупнее и площе, чем любая предыдущая кабина серии J. Хотя среди инженеров она получила прозвище «лопатонос», OPT гарантирует, что это лишь из-за мимолётного эстетического сходства, а не из-за её аэродинамических свойств или склонности зарываться в землю.
		#LOC_OPT_b_cockpit_qs_desc = Кабина Stail-QS изначально разрабатывалась для совершенно секретного высотного суборбитального разведывательного космоплана. Но после того, как осознали, что шпионить не за кем, проект был закрыт, а кабина поступила в продажу. Этот вариант оснащён двумя воздухозаборниками!
		#LOC_OPT_b_dropBay_mk2_desc = После того как несколько человек пожаловались на необходимость использования ускорителей для сброса роверов, инженеры OPT разработали этот сбрасываемый отсек, позволяющий сбрасывать транспортные средства прямо вниз. Вариант Mk2 не имеет переборок.
		#LOC_OPT_b_oms_desc = Долгожданный и часто требуемый клиентами с классическими предпочтениями, встроенный блок SAS и RCS для фюзеляжа Stail наконец-то появился.
		#LOC_OPT_b2_4m_adaptor_variant_desc = Аэродинамический переходник с 2.5 м на систему Stail, который можно настроить для различных вариантов топливных баков. Инженеры согласны, что это шаг вперёд по сравнению с предыдущим решением с использованием изоленты.
		#LOC_OPT_b2_adaptor_desc = Новый и улучшенный переходник фюзеляжа с 2.5 м на систему Stail, предлагающий два узла крепления 1.5 м параллельно настраиваемому фюзеляжу 2.5 м.
		#LOC_OPT_bf_adaptor_desc = Сохраняя аэродинамику деталей «Stail», грузовые модули «Stail» позволяют загружать крупногабаритные грузы за счёт топливной ёмкости.
		#LOC_OPT_bf_cargo_desc = Сохраняя аэродинамику деталей «Stail», грузовые модули «Stail» позволяют загружать крупногабаритные грузы за счёт топливной ёмкости.
		#LOC_OPT_bf_cargo_tail_desc = Сохраняя аэродинамику деталей «Stail», грузовые модули «Stail» позволяют загружать крупногабаритные грузы за счёт топливной ёмкости.
		#LOC_OPT_bs_adaptor_desc = Этот обтекаемый переходник плотно прилегает к стеку 2.5 м, открывая безграничные возможности для установки любых удивительных вещей — при условии, что их диаметр составляет 1.25 м. Его также можно использовать как небольшой бак монопропеллента.
		#LOC_OPT_mk2b_adaptor_desc = Поспешное сотрудничество между OPT и C7 aerospace привело к созданию этого. Мы не совсем уверены, почему они решили, что это хорошая идея, но, думаем, кто-нибудь когда-нибудь найдёт этому применение.
		
		#LOC_OPT_b_docking_port_desc = Стыковочный узел спроектирован так, чтобы подходить как к небольшим 1.25-метровым Clamp-O-Tron, так и к 2.5-метровым. Гениально!
		#LOC_OPT_b_docking_port1_desc = Это небольшой грузовой отсек, совмещённый с маленьким стыковочным узлом.
		#LOC_OPT_B_Drop_Bay_mk1_desc = После того как несколько кербанов пожаловались на то, что им приходится использовать ускорители для сброса роверов, инженеры OPT разработали этот сбрасываемый отсек, позволяющий сбрасывать транспортные средства прямо вниз. Вариант Mk1 имеет переборки на каждом конце.
		
