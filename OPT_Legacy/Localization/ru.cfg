		#LOC_OPT_opt_stabilizer_c_desc = Истребительная серия, сильно стреловидная, цельноповоротная управляемая поверхность. Для использования в качестве предкрылка у корня крыла или как переднее горизонтальное оперение (ПГО).
		#LOC_OPT_opt_stabilizer_d_desc = Истребительная серия, цельноповоротная управляемая поверхность.
		#LOC_OPT_wing_1a_desc = Крыло космоплана в форме трапеции. Может содержать топливо и очень хорошо помогает отводить тепло, но плохо его удерживает.
		#LOC_OPT_winglet_1a_desc = Красивое большое крылышко, которое на самом деле является элевоном. Очень хорошо помогает отводить тепло и лучше всего подходит в качестве вертикального стабилизатора.
		#LOC_OPT_opt_wing_d_desc = Крыло XL серии Questor. Для использования в качестве вертикального стабилизатора для самолётов KH и Горбач.
		#LOC_OPT_opt_wing_e_desc = Крыло XL серии Questor. Для использования в качестве основного крыла для самолётов KH и Горбач.
		#LOC_OPT_opt_wing_e_rudder_desc = Вертикальный стабилизатор, который крепится внутри и сквозь родительское крыло. Его стратегическое размещение может быть очень полезным для уменьшения горизонтального дрейфа.
		#LOC_OPT_opt_winglet_d_desc = Истребительная серия, крыло с обратной стреловидностью.
		#LOC_OPT_opt_winglet_e_desc = Истребительная серия, стреловидное крыло с приводом. Для использования в качестве вертикального стабилизатора.
		#LOC_OPT_opt_winglet_f_desc = Истребительная серия, крыло с обратной стреловидностью. Принимает четыре элевона, включая два передних.
		#LOC_OPT_opt_winglet_f_elevon1_desc = Предкрылок и управляемая поверхность. Нажмите A для ориентации, с отключённой привязкой к углам.
		#LOC_OPT_opt_winglet_f_elevon2_desc = Предкрылок и управляемая поверхность. Нажмите D для ориентации, с отключённой привязкой к углам. Возможно, потребуется изменить ограничение отклонения на обратное.
		#LOC_OPT_opt_winglet_g_desc = Истребительная серия, стреловидное крыло с приводом. Для использования в качестве вертикального стабилизатора.
