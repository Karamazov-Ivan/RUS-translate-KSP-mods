		#LOC_OPT_ab_7m_adaptor_title = OPT Avatar to Stail Long Adapter
		#LOC_OPT_a_8m_cockpit_title = OPT Avatar Shuttle Cockpit
		
		#LOC_OPT_a_2m_bicoupler_desc = Способный обеспечить не одно, а целых две точки крепления 3.75 м, бикулер K был провозглашён революцией в авиакосмической промышленности. Хотя в целом он не оправдал этих ожиданий, ему удалось произвести революцию в новой области — разделении одной большой вещи на две большие, в чём он преуспел.
		#LOC_OPT_a_3m_tanks_desc = Это просто топливный бак, но очень большой ёмкости. И он имеет форму коробки.
		#LOC_OPT_a_3m_fuselage_desc = Это половина того полого отсека, которым он был раньше. Врубитесь.
		#LOC_OPT_a_6m_cargo_desc = Большой грузовой отсек, предположительно предназначенный для перевозки соответствующих крупногабаритных грузов, но с инженерами OPT никогда не знаешь наверняка.
		#LOC_OPT_a_6m_cargoTail_desc = Ни один грузовой шаттл не обходится без трапа, по которому груз может заехать или закатиться внутрь. Ведь так?
		#LOC_OPT_a_6m_tanks_desc = Это просто топливный бак, но очень большой ёмкости. И он имеет форму коробки.
		#LOC_OPT_a_6m_fuselage_desc = Иногда необходимо иметь пространство без необходимости напрямую открывать дверь, а иногда наличие двери доставляет хлопоты, так как она может заклинить и привести к серьёзным травмам. Полый фюзеляж — это, по сути, увеличенный служебный отсек. Если что-то слишком длинное, чтобы пролезть через грузовую дверь, здесь есть запас места.
		#LOC_OPT_a_cockpit_desc = Кабина «Химера» жертвует изрядной долей обычных удобств, таких как зона сидений, ароматизированная сосна и качающаяся гавайская танцовщица на приборной панели, ради повышения выживаемости при входе в атмосферу и облегчения способности рассекать атмосферу… что, как некоторые скажут, не очень хорошо при спуске. Но эй, работает правило «Крутость превыше всего».
		#LOC_OPT_a_cockpit_adaptor_desc = Модифицированный переходник, созданный для уникальной кабины шаттла Avatar. Также оснащён сдвоенным воздухозаборником!
		#LOC_OPT_a_oms_hollow_desc = Долгожданный и часто требуемый клиентами с классическими предпочтениями, встроенный блок SAS и RCS для фюзеляжа Avatar наконец-то появился.
		#LOC_OPT_ab_3m_adaptor_desc = Адаптироваться к переменам бывает трудно. Этот удобный отсек фюзеляжа не поможет, если только вы не переходите от детали системы Stail к её более крупному аналогу типа K — в этом случае он то, что нужно.
		#LOC_OPT_ab_7m_adaptor_desc = Адаптироваться к переменам бывает трудно. Этот удобный отсек фюзеляжа не поможет, если только вы не переходите от детали системы Stail к её более крупному аналогу типа K — в этом случае он то, что нужно.
		#LOC_OPT_a_8m_cockpit_desc = Эта большая кабина пользовалась высоким спросом и была специально создана для удовлетворения потребностей сообщества STS в преддверии развития, выходящего за рамки популярной платформы шаттла Mk3. Делая ставку на высокий потенциал широкофюзеляжных грузовых самолётов, инженеры OPT даже добавили полое пространство внутри кабины для хранения важного оборудования и ресурсов жизнеобеспечения, к которым никогда не нужно обращаться в грузовом отсеке.
		
		// Communication
		#LOC_OPT_OPTantenna_title = OPT Ultra High Frequency Blade Antenna
		#LOC_OPT_OPTantenna_desc = Изначально задуманная как устройство для разрезания облаков на более мелкие кусочки, лезвийная антенна позволяет осуществлять атмосферную связь без ущерба для аэродинамики! Изначально принадлежала и разрабатывалась Kerbal Space Industries, но недавно была получена в результате промышленного саботажа и получила новую покраску.
		
		// Electric
		#LOC_OPT_opt_powersphere1a_title = OPT-E VS01-125 Power Core "Tidal Force"
		#LOC_OPT_opt_powersphere1a2_title = OPT-E VS01-250 Power Core "Tidal Force"
		#LOC_OPT_opt_powersphere1b_title = OPT-E VS02-125 Power Core "Dark Energy"
		#LOC_OPT_opt_powersphere2_title = OPT-E VS02-250 Power Core "Dark Energy"
		
		#LOC_OPT_opt_powersphere1a_desc = Серия VS00 — это двигатель во всех смыслах, только не предназначенный для движения. Секреты работы этого величественного топливного элемента глубоки, но если судить по его кодовому названию, его работа может напоминать внутренности небесного тела.
		#LOC_OPT_opt_powersphere1a2_desc = Серия VS00 — это двигатель во всех смыслах, только не предназначенный для движения. Секреты работы этого величественного топливного элемента глубоки, но если судить по его кодовому названию, его работа может напоминать внутренности небесного тела.
		#LOC_OPT_opt_powersphere1b_desc = После открытия и углублённых исследований «Тёмной субстанции» инженерный отдел OPT в конце концов надёжно подтвердил ещё одно применение Тёмной субстанции. Используя невероятно плотные внутренние и электромагнитные конструкционные материалы, мы позволили Тёмной субстанции перерабатывать более мощные вещества, чем жидкое топливо и окислитель, и производить любопытные и экзотические вещи!
		#LOC_OPT_opt_powersphere2_desc = Никто не знал, что увеличение такого реактора в размерах приведёт к тому, что его производительность вырастет гораздо сильнее линейной. Прирост и количество хранящейся внутри Тёмной субстанции настолько велики, что это пугает! А что, если Тёмная субстанция каким-то образом вырвется из этой штуки?!
		
