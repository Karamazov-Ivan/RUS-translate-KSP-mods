		#LOC_OPT_ij_4m_adaptor_variant_desc = Гладкий переходник с 2.5 м на фюзеляж J.
		#LOC_OPT_ij_adaptor_desc = Немного более интересный переходник с 2.5 м на фюзеляж J.
		#LOC_OPT_j_2m_bicoupler_desc = Хорошо выглядящий переходник с фюзеляжа J на две структуры диаметром 2.5 м.
		#LOC_OPT_j_docking_port_desc = Стандартный стыковочный узел, встроенный в фюзеляж J.
		#LOC_OPT_j_2m_tanks_desc = Стандартный топливный бак OPT для фюзеляжа J.
		#LOC_OPT_j_2m_inlineBoardingRamp_desc = Идея посадочного трапа существует уже столетия, непонятно, почему его не сделали до сих пор.
		#LOC_OPT_j_deploymentBay_desc = Этот уникальный грузовой отсек имеет вертикальную точку крепления, идеально подходит для размещения ракет VTOL, коммуникационных массивов и спутников среднего размера.
		#LOC_OPT_j_large_docking_port_desc = Большой стыковочный узел, встроенный в фюзеляж J.
		#LOC_OPT_j_3m_rearHatch_desc = OPT создала это после множества жалоб от кербалов, которые не могли вернуться на свой корабль после выхода из него.
		#LOC_OPT_j_4m_cargo_desc = Стандартный грузовой отсек OPT, усиленный блестящими балками и поставляется с топливным баком!
		#LOC_OPT_j_4m_crew_desc = Вместимость 8 кербалов и немного топлива! Этот салон бизнес-класса предоставляет вашим кербалам отличное личное пространство! Хотя неясно, им ли это важно.
		#LOC_OPT_j_engineMount_4_desc = Крепление двигателя для фюзеляжа J на 4 двигателя 1.25 м. Приятно, когда всё в линию!
		#LOC_OPT_j_4m_tanks_desc = Стандартный топливный бак OPT для фюзеляжа J.
		#LOC_OPT_j_4m_lab_desc = Современная мобильная лаборатория OPT, установленная на фюзеляж J. В ней могут разместиться 5 трудолюбивых учёных, чтобы добывать науку без остановки для всеобщего блага.
		#LOC_OPT_j_4m_service_desc = Ещё одна уникальная идея инженеров OPT, которые всегда задавались вопросом, почему грузовой отсек не может открываться и сверху, и снизу? Однако OPT потеряла патентные права, так как оригинальный прототип был утерян и найден кем-то, кто утверждал, что нашёл его на обочине дороги.
		#LOC_OPT_j_5m_nose_desc = Этот носовой обтекатель специально разработан для высокоскоростного входа в атмосферу. ПРЕДУПРЕЖДЕНИЕ: это не означает, что другие части вашего корабля не взорвутся.
		#LOC_OPT_j_5m_tail_desc = Выглядит так же аэродинамично, как и рекламируется.
		#LOC_OPT_j_6m_cockpit_desc = Кабина J-HT v.0390 — это 2-местная кабина, оснащённая двумя воздухозаборниками RAM и очень хорошим углом обзора из больших окон кабины. Наличие вертикального носа вместо обычного лопатовидного оказалось более эффективным, чем думало большинство кербалов!
		#LOC_OPT_j_cockpitv2_desc = Кабина типа J-SL прошла через множество модификаций. Последняя версия, Mk3, имеет всё, что нужно космоплану: выдающийся внешний вид, идеальную аэродинамику, идеальные углы обзора, вместимость 6 членов экипажа с припасами и пару тормозных двигателей. Чего ещё можно желать?
		#LOC_OPT_j_cockpit_qs_desc = Кабина типа J-QS изначально разрабатывалась для сверхсекретного разведывательного космоплана, предназначенного для полётов на очень большой высоте в суборбитальном пространстве. Но после того, как они поняли, что шпионить не за кем, проект был закрыт, и кабина стала доступна для продажи. Этот вариант оснащён двумя воздухозаборниками RAM!
		#LOC_OPT_j_cockpit_qs_no_intake_desc = Кабина типа J-QS изначально разрабатывалась для сверхсекретного разведывательного космоплана, предназначенного для полётов на очень большой высоте в суборбитальном пространстве. Но после того, как они поняли, что шпионить не за кем, проект был закрыт, и кабина стала доступна для продажи.
		#LOC_OPT_j_4m_drone_desc = Стандартный дрон-блок OPT, установленный на фюзеляж J.
		#LOC_OPT_j_4m_droneRCS_desc = Дрон-блок фюзеляжа J, оснащённый 6 мощными портами RCS.
		#LOC_OPT_j_sas_desc = Инженер, спроектировавший эту систему RCS, страдал сильным ОКР по поводу того, чтобы ничего не торчало из фюзеляжа.
		#LOC_OPT_mk2j_adaptor_desc = Несбалансированный переходник с фюзеляжа Mk2 на фюзеляж J, возможно, будет полезен.
		
