		#LOC_OPT_jk_3m_adaptor_desc = Более короткая версия более длинной версии переходника с фюзеляжа J на фюзеляж K.
		#LOC_OPT_jk_7m_adaptor_desc = Более длинная версия более короткой версии переходника с фюзеляжа J на фюзеляж K.
		#LOC_OPT_k_2m_bicoupler_desc = Когда-то OPT заработали кучу средств. Но мы потратили всё на огромный космоплан с двумя гигантскими Тёмными приводами. Космоплан разбился, тёмные приводы исчезли, OPT обанкротилась, но этот массивный бикулер выжил, что приятно.
		#LOC_OPT_k_3m_fuelTank_desc = Большой топливный бак для фюзеляжа K.
		#LOC_OPT_k_3m_fuselage_desc = Полый фюзеляж K, думаю, внутрь можно положить много чего.
		#LOC_OPT_k_3m_tricoupler_desc = Теперь вы можете установить на свой космоплан три двигателя Mainsail! Но многие сомневаются, что он достигнет орбиты.
		#LOC_OPT_k_6m_cargo_desc = Стандартный грузовой отсек OPT для фюзеляжа K. Его большое прямоугольное грузовое пространство идеально подходит для крупных плоских грузов.
		#LOC_OPT_k_6m_fuelTank_desc = Очень большой топливный бак для фюзеляжа K.
		#LOC_OPT_k_6m_fuselage_desc = Полый фюзеляж K, думаю, внутрь можно положить много чего.
		#LOC_OPT_k_10m_cockpit_desc = Эта массивная кабина была создана на основе успешной кабины J-SL. Помимо того, что это отличная кабина космоплана, она оснащена полностью функциональным жилым отсеком для длительных экспедиций. Вместимость экипажа — 10 человек, которые будут спорить, кому из кербанов спать на удобных космических кроватях.
		#LOC_OPT_k_7m_cargoTail_desc = Этот массивный грузовой трап был спроектирован так, чтобы на его боковые стороны можно было крепить две конструкции Mk2.
		#LOC_OPT_k_7m_cargoTail_variant_desc = У этого варианта грузового трапа K точки крепления Mk2 заменены на топливные баки.
		#LOC_OPT_kh_3m_cargo_desc = Похож на фюзеляж K, но с горбом для дополнительной грузовместимости!
		#LOC_OPT_kh_3m_fuselage_desc = Вернер фон Керман заметил, что эту массивную деталь можно было бы использовать как врата гиперпространства, когда у нас появится технология перемещения.
		#LOC_OPT_kh_6m_cargo_desc = Похож на фюзеляж K, но с горбом для дополнительной грузовместимости!
		#LOC_OPT_kh_6m_fuselage_desc = Похоже, некая компания приобрела эту деталь в качестве гаража, чтобы парковать внутри свой большой грузовик.
		#LOC_OPT_kh_7m_cargoTail_desc = Добавлен горб к аналогу фюзеляжа K.
		#LOC_OPT_kh_7m_cargoTail_variant_desc = Идеально подходит для проведения вечеринок.
		
		#LOC_OPT_k_3m_droneRCS_title = OPT K Drone Core with RCS
		#LOC_OPT_k_oms_title = OPT K Inline SAS Unit
		#LOC_OPT_k_oms_hollow_title = OPT K Inline SAS Unit Hollow
		#LOC_OPT_kh_oms_hollow_title = OPT KH Inline SAS Unit Hollow
		#LOC_OPT_k_3m_crew_title = OPT K 3m Crew Compartment
		#LOC_OPT_k_3m_lab_title = OPT K Mobile Lab LP4
		#LOC_OPT_k_10m_cockpit_custom_title = OPT K Avatar Ouelette Custom Cockpit
		#LOC_OPT_k_10m_cockpit_legacy_title = OPT K TAV Shuttle Cockpit
		
		#LOC_OPT_k_3m_droneRCS_desc = Инженер, предложивший эту конструкцию, был либо весьма эффективен, либо очень ленив. Мы пока не определились.
		#LOC_OPT_k_oms_desc = Некоторые инженеры, даже из OPT, давно хотели, чтобы эта деталь появилась на рынке. К сожалению, как только они решили начать сборку прототипа для себя, с конвейеров начали сходить блоки аэродинамических маневровых двигателей. Эти инженеры решили пойти на компромисс и представили свой проект как, по сути, вспомогательную деталь, несущую только топливные баки и гиродины. Их бунт, к счастью, не привёл к увольнению или чему-то похуже.
		#LOC_OPT_k_3m_crew_desc = Этот довольно большой отсек одновременно тесен и просторен, в зависимости от того, как он организован или как его видит каждый отдельный кербан. В любом случае, он может вместить 6 кербанов с относительным комфортом, и это главное.
		#LOC_OPT_k_3m_lab_desc = Современная мобильная лаборатория OPT, установленная в фюзеляж K. Вмещает 6 трудолюбивых учёных для беспрерывного сбора науки во имя всеобщего блага.
		#LOC_OPT_k_10m_cockpit_custom_desc = Нестандартная заострённая кабина космоплана неизвестного происхождения. Возможно, её клиновидный нос поможет снизить сопротивление, а не увеличить его, но никто не подтвердил и не опроверг этого.
		
