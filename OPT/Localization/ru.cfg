		#LOC_OPT_ij_4m_adaptor_variant_desc = Плавный переходник с 2.5 м на фюзеляж J.
		#LOC_OPT_ij_adaptor_desc = Чуть более интересный переходник с 2.5 м на фюзеляж J.
		#LOC_OPT_j_2m_bicoupler_desc = Хорошо выглядящий переходник с фюзеляжа J на две конструкции диаметром 2.5 м.
		#LOC_OPT_j_docking_port_desc = Стандартный стыковочный узел, встроенный в фюзеляж J.
		#LOC_OPT_j_2m_tanks_desc = Стандартный топливный бак OPT для фюзеляжа J.
		#LOC_OPT_j_2m_inlineBoardingRamp_desc = Идея встроенного трапа существует уже много лет, непонятно, почему её не сделали раньше.
		#LOC_OPT_j_deploymentBay_desc = Этот уникальный грузовой отсек имеет вертикальную точку крепления, идеально подходит для размещения ракет с вертикальным взлётом, коммуникационных антенн и средних спутников.
		#LOC_OPT_j_large_docking_port_desc = Крупный стыковочный узел, встроенный в фюзеляж J.
		#LOC_OPT_j_3m_rearHatch_desc = OPT создали это после множества жалоб от кербанов, которые не могли вернуться на свой корабль после выхода из него.
		#LOC_OPT_j_4m_cargo_desc = Стандартный грузовой отсек OPT, усиленный блестящими балками и с топливным баком!
		#LOC_OPT_j_4m_crew_desc = Вместимость 8 кербанов и немного топлива! Этот салон бизнес-класса обеспечит вашим кербанам отличное личное пространство! Хотя мы не уверены, что им это важно.
		#LOC_OPT_j_engineMount_4_desc = Моторный отсек фюзеляжа J для 4 двигателей 1.25 м. Приятно, когда всё в одной линии!
		#LOC_OPT_j_4m_tanks_desc = Стандартный топливный бак OPT для фюзеляжа J.
		#LOC_OPT_j_4m_lab_desc = Современная мобильная лаборатория OPT, установленная в фюзеляж J. Вмещает 5 трудолюбивых учёных для беспрерывного сбора науки во имя всеобщего блага.
		#LOC_OPT_j_4m_service_desc = Ещё одна уникальная идея инженеров OPT, которые всегда задавались вопросом, почему грузовой отсек не может открываться и сверху, и снизу? Однако OPT потеряла патентные права, так как оригинальный прототип был утерян и найден кем-то, кто заявил, что обнаружил его на обочине дороги.
		#LOC_OPT_j_5m_nose_desc = Этот обтекатель специально разработан для высокоскоростного входа в атмосферу. ПРЕДУПРЕЖДЕНИЕ: это не означает, что другие части вашего корабля не взорвутся.
		#LOC_OPT_j_5m_tail_desc = Выглядит так же аэродинамично, как заявлено.
		#LOC_OPT_j_6m_cockpit_desc = Кабина J-HT v.0390 — 2-местная кабина, оснащена двумя воздухозаборниками и очень хорошими углами обзора из-за больших окон кабины. Наличие вертикальной кромки носа вместо обычного закруглённого оказалось эффективнее, чем думали большинство кербанов!
		#LOC_OPT_j_cockpitv2_desc = Кабина J-SL прошла множество модификаций. Последняя версия Mk3 имеет всё, что нужно космоплану: отличный внешний вид, идеальную аэродинамику, идеальные углы обзора, вместимость 6 членов экипажа с припасами и пару ретро-двигателей. Чего ещё можно желать?
		#LOC_OPT_j_cockpit_qs_desc = Кабина J-QS изначально разрабатывалась для совершенно секретного высотного суборбитального разведывательного космоплана. Но после того, как осознали, что шпионить не за кем, проект был закрыт, а кабина поступила в продажу. Этот вариант оснащён двумя воздухозаборниками!
		#LOC_OPT_j_cockpit_qs_no_intake_desc = Кабина J-QS изначально разрабатывалась для совершенно секретного высотного суборбитального разведывательного космоплана. Но после того, как осознали, что шпионить не за кем, проект был закрыт, а кабина поступила в продажу.
		#LOC_OPT_j_4m_drone_desc = Стандартный беспилотный блок OPT для фюзеляжа J.
		#LOC_OPT_j_4m_droneRCS_desc = Беспилотный блок фюзеляжа J, оснащённый 6 мощными двигателями ориентации.
		#LOC_OPT_j_sas_desc = У инженера, спроектировавшего эту систему RCS, был серьёзный ОКР: он не терпел ничего, что торчит из фюзеляжа.
		#LOC_OPT_mk2j_adaptor_desc = Несбалансированный переходник с фюзеляжа Mk2 на J, возможно, будет полезен.
		
