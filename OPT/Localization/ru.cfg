		#LOC_OPT_opt_s2intake_title = OPT 2.5м Ударный воздухозаборник "Туманность"
		
		#LOC_OPT_i_4m_cockpit_isp_desc = 3-местная кабина шаттла, разработанная OPT для фюзеляжей диаметром 2.5 м, кабина ISP — это аэродинамический и, как нас уверяют, почти полностью безопасный командный отсек космоплана.
		#LOC_OPT_i_4m_tail_desc = Хвостовая часть фюзеляжа 2.5 м.
		#LOC_OPT_ils_cockpitv2_desc = Кабина ILS — это экспериментальная кабина, созданная OPT в первые дни космических полётов. Может вместить 1 пилота и 2 пассажиров. На момент создания это была самая аэродинамичная и красивая кабина.
		#LOC_OPT_phoenix_cockpit_desc = Концептуальная кабина "Феникс" действительно уникальна. Помимо своей красоты, она обеспечивает почти 360-градусный обзор и уникальную конфигурацию сидений, которая позволяет кербалу чувствовать себя капитаном.
		#LOC_OPT_opt_s2intake_desc = Проектирование воздушно-реактивного двигателя обычно несложно. Разработать лучший из них было довольно трудно... Но создание мотогондолы, подходящей для этого двигателя, J-92 Shcramjet, заставило лучших умов OPT просто биться головами о столы. Так продолжалось, пока кто-то не открыл способ правильно компоновать внутренности... после случайной укладки вещей в ящик стола и последующего обнаружения, что всё как-то само собой хорошо упорядочилось.
		
