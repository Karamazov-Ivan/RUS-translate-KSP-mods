		// Engines
		#LOC_OPT_AAengine_title = OPT-E ARI-75b S.C.O.O.P. Rocket
		#LOC_OPT_engine_darkDrive_title = OPT-E BH-S3 "Dark Drive"
		#LOC_OPT_j_linear_aerospike_title = OPT-E J Linear Aerospike Engine
		#LOC_OPT_opt_mk2_engine_short_title = OPT-E HAE-02 High Altitude TurboRamjet
		#LOC_OPT_opt_nebula_engine_title = OPT-E J-92 "Nebula" Shcramjet
		#LOC_OPT_opt_vtol_jumpa1_title = OPT-E VT "Valkyrie" Tilt Engine
		#LOC_OPT_opt_vtol_jumpa2_title = OPT-E WarpJet M.A.R.G.E.
		#LOC_OPT_opt_vtol_wrapj1_title = OPT-E FVT-J
		#LOC_OPT_opt_vtol_wrapj2_title = OPT-E WarpJet FVT-J
		#LOC_OPT_opt_vtol_wrapk1_title = OPT-E FVT-K
		#LOC_OPT_opt_vtol_wrapk2_title = OPT-E WarpJet FVT-K
		
		#LOC_OPT_AAengine_desc = Двигатель ARI – это уникальный малогабаритный двигатель. Он использует технологию S.C.O.O.P. от OPT для достижения высокой эффективности в атмосфере. В то же время он работает как обычный химический двигатель в космосе.
		#LOC_OPT_engine_darkDrive_desc = После десятилетий совершенно секретных исследований Таинственной субстанции кербанские учёные наконец обнаружили или создали то, что было метко названо Тёмной субстанцией. После этого прорыва они только начали находить её применение в удержании, каталитических процессах и горении, а вместе с этим – способность создавать новый любопытный тип двигателей, Тёмный привод.
		#LOC_OPT_j_linear_aerospike_desc = Этот линейный аэрошипный двигатель предназначен для фюзеляжа J. Он определённо обладает мощностью, не соответствующей его размеру.
		#LOC_OPT_opt_mk2_engine_short_desc = Загадочный атмосферный двигатель, обеспечивающий большую тягу в разрежённой атмосфере.
		#LOC_OPT_opt_nebula_engine_desc = Двигатель «Туманность» — это идеальный двигатель для достижения SSTO. Это шикрэмджет, оснащённый массивным блоком Super Condensation Optimized Output Propulsion. Он забирает различные инертные газы в атмосфере. При достижении оптимальной скорости и высоты двигатель ионизирует и перегревает газы в своей камере, после чего полученная плазма выбрасывается вместе с горячим газом из шикрэмджета. Результатом является яркое синее плазменное «форсажное пламя», которое придаст любому космоплану мощный импульс для выхода в космос.
		#LOC_OPT_opt_vtol_jumpa1_desc = Инженеры OPT осознали на средне-позднем этапе своей программы создания двигателей с вертикальным взлётом и посадкой, что существует слишком мало двигателей, способных свободно переключаться между вертикальным и горизонтальным режимами. Особенно для крупных самолётов, таких как класс K, предназначена эта модель, но построить что-то поменьше тоже не составит труда...
		#LOC_OPT_opt_vtol_jumpa2_desc = Само собой разумеется, что должна была существовать версия K Tilt Engine от WarpJet. Так появилась M.A.R.G.E. (Modular Axis Respirating Gauss Engine). Как и S.U.R.G.E., этот двигатель отлично работает в плотной атмосфере, но также способен работать в вакууме, как S.A.G.E.
		#LOC_OPT_opt_vtol_wrapj1_desc = Этот мощный аксессуар, вертикальный фюзеляжный двигатель, крепится по бокам фюзеляжа и включает работающие створки воздухозаборника и выхлопа, чтобы защитить его внутренности от огня при входе в атмосферу. Будьте осторожны, не включайте этот двигатель, пока выхлопная створка закрыта!
		#LOC_OPT_opt_vtol_wrapj2_desc = Этот мощный аксессуар, вертикальный фюзеляжный двигатель, крепится по бокам фюзеляжа и включает работающие створки воздухозаборника и выхлопа, чтобы защитить его внутренности от огня при входе в атмосферу. Будьте осторожны, не включайте этот двигатель, пока выхлопная створка закрыта!
		
