		#LOC_OPT_i_4m_cockpit_isp_desc = 3-местная кабина шаттла, разработанная OPT для фюзеляжей диаметром 2.5 м. Кабина ISP — это аэродинамичный и, как нас уверяют, почти полностью безопасный командный модуль космоплана.
		#LOC_OPT_i_4m_tail_desc = Хвостовая часть фюзеляжа 2.5 м.
		#LOC_OPT_ils_cockpitv2_desc = Кабина ILS — экспериментальная кабина, созданная OPT на заре космических полётов. Вмещает 1 пилота и 2 пассажиров. На момент создания она была самой аэродинамичной и красивой кабиной.
		#LOC_OPT_phoenix_cockpit_desc = Концептуальная кабина «Феникс» — поистине уникальный дизайн. Помимо красоты, она обеспечивает почти 360-градусный обзор и уникальную схему посадки, благодаря которой один кербана чувствует себя капитаном.
		#LOC_OPT_opt_s2intake_desc = Проектировать воздушно-реактивный двигатель обычно легко. Но создать лучший из них было довольно сложно… А спроектировать мотогондолу для такого двигателя, J-92 Shcramjet, было для лучших умов OPT просто битьём головой о стол. Так продолжалось, пока кто-то не обнаружил способ правильно организовать внутреннее пространство… после того, как случайно запихал вещи в ящик стола, а позже обнаружил, что всё как-то само собой аккуратно рассортировалось.
		
