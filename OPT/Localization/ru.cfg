		#LOC_OPT_k_3m_droneRCS_desc = Инженер, предложивший эту конструкцию, был либо весьма эффективен, либо весьма ленив. Мы ещё не определились, какой именно.
		#LOC_OPT_k_oms_desc = Некоторые инженеры, даже в OPT, давно хотели, чтобы эта деталь появилась на рынке. К сожалению, как только они решили начать собирать концептуальную деталь для себя, с конвейера начали сходить аэродинамические блоки RCS. Эти инженеры решили пойти на компромисс и представили свой проект как, по сути, вспомогательную деталь, несущую только бак и маховики. К счастью, их бунт не привёл к увольнению или чему-то похуже.
		#LOC_OPT_k_3m_crew_desc = Эта довольно большая кабина одновременно тесна и просторна, в зависимости от того, как она организована или как её видит отдельный кербал. В любом случае она может вместить 6 кербалов с относительным комфортом, и это главное.
		#LOC_OPT_k_3m_lab_desc = Современная мобильная лаборатория OPT, установленная на фюзеляж K. В ней могут разместиться 6 трудолюбивых учёных, чтобы добывать науку без остановки для всеобщего блага.
		#LOC_OPT_k_10m_cockpit_custom_desc = Пользовательская заострённая кабина космоплана из неизвестных мест. Потенциально её клиновидный нос будет очень полезен, чтобы создавать меньшее сопротивление, а не большее, но никто этого не подтвердил и не опроверг.
		
