		#LOC_OPT_jk_3m_adaptor_desc = Более короткая версия более длинной версии переходника с фюзеляжа J на фюзеляж K.
		#LOC_OPT_jk_7m_adaptor_desc = Более длинная версия более короткой версии переходника с фюзеляжа J на фюзеляж K.
		#LOC_OPT_k_2m_bicoupler_desc = Когда-то OPT заработала много средств. Но мы потратили всё на огромный космоплан с двумя гигантскими Тёмными приводами. Космоплан разбился, тёмные приводы исчезли, OPT обанкротилась, но этот массивный бикулер выжил, что приятно.
		#LOC_OPT_k_3m_fuelTank_desc = Большой топливный бак для фюзеляжа K.
		#LOC_OPT_k_3m_fuselage_desc = Пустотелый фюзеляж K, полагаю, внутрь можно поместить много всего.
		#LOC_OPT_k_3m_tricoupler_desc = Теперь вы можете установить 3 двигателя Mainsail на ваш космоплан! Но большинство сомневается, что он достигнет орбиты.
		#LOC_OPT_k_6m_cargo_desc = Стандартный грузовой отсек OPT для фюзеляжа K. Его большое прямоугольное грузовое пространство идеально подходит для крупных плоских грузов.
		#LOC_OPT_k_6m_fuelTank_desc = Очень большой топливный бак для фюзеляжа K.
		#LOC_OPT_k_6m_fuselage_desc = Пустотелый фюзеляж K, полагаю, внутрь можно поместить много всего.
		#LOC_OPT_k_10m_cockpit_desc = Эта массивная кабина была разработана на основе успешной кабины J-SL. Помимо того, что это отличная кабина космоплана, она оснащена полностью функциональным жилым отсеком для длительных экспедиций. Вместимость экипажа — 10 человек, которые будут спорить, кому из кербалов спать на удобных космических койках.
		#LOC_OPT_k_7m_cargoTail_desc = Эта массивная грузовая рампа была спроектирована так, чтобы на её боковые стороны можно было крепить две структуры Mk2.
		#LOC_OPT_k_7m_cargoTail_variant_desc = Этот вариант грузовой рампы K имеет точки крепления Mk2, заменённые на топливные баки.
		#LOC_OPT_kh_3m_cargo_desc = Аналогично фюзеляжу K, но с выступом для дополнительной грузовместимости!
		#LOC_OPT_kh_3m_fuselage_desc = Вернер фон Керман заметил, что эта массивная деталь может быть использована в качестве врат, когда у нас появится технология варп-двигателя.
		#LOC_OPT_kh_6m_cargo_desc = Аналогично фюзеляжу K, но с выступом для дополнительной грузовместимости!
		#LOC_OPT_kh_6m_fuselage_desc = По-видимому, некоторая компания приобрела эту деталь в качестве гаража, чтобы парковать внутри свой большой грузовик.
		#LOC_OPT_kh_7m_cargoTail_desc = Добавлен дополнительный выступ к аналогу фюзеляжа K.
