		// Engines
		#LOC_OPT_AAengine_title = OPT-E ARI-75b S.C.O.O.P. Ракетный двигатель
		#LOC_OPT_engine_darkDrive_title = OPT-E BH-S3 "Тёмный привод"
		#LOC_OPT_j_linear_aerospike_title = OPT-E J Линейный аэродинамический двигатель
		#LOC_OPT_opt_mk2_engine_short_title = OPT-E HAE-02 Высотный турбопрямоточный двигатель
		#LOC_OPT_opt_nebula_engine_title = OPT-E J-92 "Туманность" Шкрамджет
		#LOC_OPT_opt_vtol_jumpa1_title = OPT-E VT "Валькирия" Наклонный двигатель
		#LOC_OPT_opt_vtol_jumpa2_title = OPT-E WarpJet M.A.R.G.E.
		#LOC_OPT_opt_vtol_wrapj1_title = OPT-E FVT-J
		#LOC_OPT_opt_vtol_wrapj2_title = OPT-E WarpJet FVT-J
		#LOC_OPT_opt_vtol_wrapk1_title = OPT-E FVT-K
		#LOC_OPT_opt_vtol_wrapk2_title = OPT-E WarpJet FVT-K
		
		#LOC_OPT_AAengine_desc = Двигатель ARI — уникальный компактный двигатель. Он использует технологию S.C.O.O.P. от OPT для достижения высокой эффективности в атмосфере. При этом в космосе он работает как обычный химический ракетный двигатель.
		#LOC_OPT_engine_darkDrive_desc = После десятилетий совершенно секретных исследований Таинственной жижи кербальские учёные наконец обнаружили или создали то, что было уместно назвать Тёмной жижей. После этого прорыва они только начали находить её применение в удержании, каталитических процессах и горении, а вместе с этим — возможность создать новый любопытный тип сверхдвигателя, Тёмный привод.
		#LOC_OPT_j_linear_aerospike_desc = Этот линейный аэродинамический двигатель предназначен для фюзеляжа J. Он определённо обладает большой мощностью для своих размеров.
		#LOC_OPT_opt_mk2_engine_short_desc = Таинственный атмосферный двигатель, обеспечивающий огромную тягу в разрежённой атмосфере.
		#LOC_OPT_opt_nebula_engine_desc = Двигатель "Туманность" — это лучший двигатель для достижения SSTO. Это шкрамджет, оснащённый массивным блоком сверхконденсационного оптимизированного выходного движителя. Он засасывает различные инертные газы в атмосфере. Когда достигнуты оптимальные скорость и высота, двигатель ионизирует и перегревает газы в своей камере, а полученная плазма выбрасывается вместе с горячим газом из шкрамджета. Результат — великолепная синяя плазменная "форсажная камера", которая придаст любому космоплану мощный импульс для выхода в космос.
		#LOC_OPT_opt_vtol_jumpa1_desc = Инженеры OPT осознали на средне-поздней стадии своей программы создания двигателей с подъёмной тягой, что существует слишком мало двигателей, способных свободно переключаться между вертикальным и горизонтальным режимами работы. Особенно крупные самолёты, такие как класс K, являются целью для этой модели, но не составит труда построить и меньшие...
		#LOC_OPT_opt_vtol_jumpa2_desc = Само собой разумеется, что должна была существовать версия WarpJet наклонного двигателя K. И вот появилась M.A.R.G.E. (Модульный осевой дыхательный двигатель Гаусса). Как и S.U.R.G.E., этот двигатель очень хорошо работает в плотной атмосфере, но также способен работать в вакууме, как S.A.G.E.
		#LOC_OPT_opt_vtol_wrapj1_desc = Этот мощный дополнительный элемент, фюзеляжный вертикальный двигатель, крепится по бокам фюзеляжа и включает работающие створки воздухозаборника и выхлопа для защиты внутренностей от огня входа в атмосферу. Будьте осторожны, не включайте этот двигатель, пока выхлопная створка закрыта!
		#LOC_OPT_opt_vtol_wrapj2_desc = Этот мощный дополнительный элемент, фюзеляжный вертикальный двигатель, крепится по бокам фюзеляжа и включает работающие створки воздухозаборника и выхлопа для защиты внутренностей от огня входа в атмосферу. Будьте осторожны, не включайте этот двигатель, пока выхлопная створка закрыта!
		
